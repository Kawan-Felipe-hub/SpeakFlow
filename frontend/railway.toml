[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[env]
NODE_ENV = "production"
# Set NEXT_PUBLIC_API_URL in Railway dashboard to your backend service URL
# Example: https://speakflowbackend-production.up.railway.app/api
NEXT_PUBLIC_API_URL = "${NEXT_PUBLIC_API_URL}"
